<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" fill="none">
  <!-- Pine Trees Background -->
  <!-- Left small tree -->
  <polygon points="55,55 40,110 70,110" fill="#1a9e3f"/>
  <polygon points="55,70 45,100 65,100" fill="#15862f"/>
  <rect x="52" y="110" width="6" height="10" fill="#3d2b1f"/>

  <!-- Left medium tree -->
  <polygon points="85,35 62,110 108,110" fill="#1a9e3f"/>
  <polygon points="85,50 68,100 102,100" fill="#15862f"/>
  <polygon points="85,65 73,95 97,95" fill="#1a9e3f"/>
  <rect x="81" y="110" width="8" height="12" fill="#3d2b1f"/>

  <!-- Right medium tree -->
  <polygon points="315,35 292,110 338,110" fill="#1a9e3f"/>
  <polygon points="315,50 298,100 332,100" fill="#15862f"/>
  <polygon points="315,65 303,95 327,95" fill="#1a9e3f"/>
  <rect x="311" y="110" width="8" height="12" fill="#3d2b1f"/>

  <!-- Right small tree -->
  <polygon points="345,55 330,110 360,110" fill="#1a9e3f"/>
  <polygon points="345,70 335,100 355,100" fill="#15862f"/>
  <rect x="342" y="110" width="6" height="10" fill="#3d2b1f"/>

  <!-- Mountains -->
  <polygon points="100,110 165,40 230,110" fill="#3d2b1f"/>
  <polygon points="155,42 165,40 195,72 165,72" fill="#5c4033" opacity="0.5"/>
  <polygon points="170,110 235,40 300,110" fill="#2d1f14"/>
  <polygon points="225,42 235,40 265,72 235,72" fill="#4a332a" opacity="0.5"/>

  <!-- Pelican Bird - centered on mountains -->
  <g transform="translate(168, 28) scale(0.65)">
    <!-- Body -->
    <ellipse cx="50" cy="70" rx="30" ry="22" fill="#3d2b1f"/>
    <!-- Neck curve -->
    <path d="M 35,55 Q 25,30 40,15 Q 48,8 55,12" stroke="#3d2b1f" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Head -->
    <circle cx="55" cy="12" r="9" fill="#3d2b1f"/>
    <!-- Eye -->
    <circle cx="58" cy="10" r="2.5" fill="white"/>
    <circle cx="58.5" cy="10" r="1.2" fill="#3d2b1f"/>
    <!-- Beak -->
    <path d="M 63,12 L 85,16 L 63,18 Z" fill="#3d2b1f"/>
    <path d="M 63,14 L 82,16.5 L 63,17.5 Z" fill="#5c4033"/>
    <!-- Pouch hint -->
    <path d="M 63,15 Q 72,22 63,18" stroke="#5c4033" stroke-width="1.5" fill="none"/>
    <!-- Wing -->
    <path d="M 30,60 Q 15,55 20,75 Q 25,85 45,85" fill="#2d1f14"/>
    <!-- Tail -->
    <path d="M 75,65 L 95,55 L 90,70 Z" fill="#2d1f14"/>
  </g>

  <!-- PELICAN Text -->
  <text x="200" y="142" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="38" font-weight="900" fill="#2d1f14" letter-spacing="4">PELICAN</text>

  <!-- Decorative lines -->
  <line x1="75" y1="155" x2="142" y2="155" stroke="#1a9e3f" stroke-width="2.5"/>
  <line x1="258" y1="155" x2="325" y2="155" stroke="#1a9e3f" stroke-width="2.5"/>

  <!-- LANDSCAPING LLC Text -->
  <text x="200" y="162" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#1a9e3f" letter-spacing="5">LANDSCAPING LLC</text>
</svg>